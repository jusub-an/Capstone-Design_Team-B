<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 가상 피팅 하의 치수 측정기 1.1</title>
    
    <script>
        function logMsg(msg, isError = false) {
            const logBox = document.getElementById('debugLog');
            if (logBox) {
                const p = document.createElement('p');
                p.style.color = isError ? '#ff4444' : '#4CAF50';
                p.style.margin = '5px 0';
                p.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
                logBox.appendChild(p);
                logBox.scrollTop = logBox.scrollHeight;
            }
            console[isError ? 'error' : 'log'](msg);
        }
        
        let isCvReady = false;
        let isAiReady = false;

        window.onOpenCvReady = function() {
            isCvReady = true;
            logMsg('✅ OpenCV 엔진 로드 성공!');
            window.checkReadyState();
        };

        window.checkReadyState = function() {
            if(isCvReady && isAiReady) {
                const btn = document.getElementById('captureBtn');
                btn.innerHTML = "📸 사진 업로드 및 분석 시작";
                btn.style.pointerEvents = "auto";
                btn.style.opacity = "1";
                btn.style.backgroundColor = "#4CAF50";
            }
        };
    </script>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="window.onOpenCvReady();" onerror="logMsg('❌ OpenCV 로드 실패!', true)"></script>

    <script type="module">
        import { removeBackground } from "https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm";
        window.removeBg = removeBackground;
        isAiReady = true;
        logMsg('✅ @imgly AI 모듈 준비 완료!');
        window.checkReadyState();
    </script>

    <style>
        body { font-family: "Segoe UI", Roboto, sans-serif; background-color: #121212; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .btn { background-color: #4CAF50; color: white; padding: 15px 25px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        
        #uiContainer { position: relative; display: inline-block; margin-top: 20px; max-width: 100%; }
        #interactionCanvas { border-radius: 10px; box-shadow: 0 4px 15px rgba(255,255,255,0.1); cursor: crosshair; touch-action: none; max-width: 100%; }
        
        #instruction { margin-top: 15px; font-size: 18px; font-weight: bold; color: #ffdd57; padding: 10px; background: #222; border-radius: 8px; display: inline-block; }
        
        #loader { display: none; margin-top: 30px; }
        .spinner { border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #fff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #resultBox { display: none; background-color: #222; padding: 20px; border-radius: 12px; margin-top: 20px; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
        .result-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 12px 0; font-size: 17px;}
        
        #debugPanel { background-color: #000; border: 1px solid #555; padding: 10px; margin-top: 30px; border-radius: 8px; text-align: left; font-size: 12px; height: 120px; overflow-y: auto; font-family: monospace; }
        #debugPanel h4 { margin: 0 0 10px 0; color: #aaa; text-align: center; }

        .checkerboard { background-color: #1a1a1a; background-image: linear-gradient(45deg, #2b2b2b 25%, transparent 25%), linear-gradient(-45deg, #2b2b2b 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #2b2b2b 75%), linear-gradient(-45deg, transparent 75%, #2b2b2b 75%); background-size: 20px 20px; background-position: 0 0, 0 10px, 10px -10px, -10px 0px; }
        
        #maskViews { display: none; margin-top: 30px; background-color: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px dashed #555; }
        .mask-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 15px; margin-bottom: 20px; border-bottom: 1px dashed #333; padding-bottom: 20px; }
        .mask-container:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .mask-wrapper { width: 45%; min-width: 200px; }
        .mask-wrapper img { width: 100%; border: 1px solid #444; border-radius: 5px; background: #000; }
        .mask-label { font-size: 14px; color: #ccc; margin-bottom: 8px; font-weight: bold;}
    </style>
</head>
<body>
    <h2>👖 스마트 하의 치수 추출기</h2>
    <p style="color:#aaa; font-size:14px;">정확한 추출을 위해 의류와 A4 용지의 영역을 각각 지정해주세요.</p>
    
    <label for="cameraInput" class="btn" id="captureBtn" style="pointer-events: none; opacity: 0.5; background-color: #888;">엔진 로딩 중...</label>
    <input type="file" id="cameraInput" accept="image/*" style="display: none;">
    
    <div id="instruction" style="display: none;">1️⃣ 원본 이미지에서 <span style="color:#ff4444;">의류 영역</span>을 드래그하여 박스를 쳐주세요.</div>
    <br>
    <button id="resetBoxBtn" class="btn" style="display: none; background-color: #ff9800;">다시 그리기</button>
    <button id="startAiBtn" class="btn" style="display: none; background-color: #2196F3;">🚀 AI 분석 시작</button>

    <div id="uiContainer">
        <canvas id="interactionCanvas" style="display: none;"></canvas>
    </div>
    
    <div id="loader">
        <div class="spinner"></div>
        <p id="loaderText" style="margin-top:15px; font-size:16px;">AI 누끼 추출 및 텐서 기하학 분석 중...</p>
    </div>
    
    <div id="resultBox">
        <h3 style="text-align:center; color:#4CAF50; margin-top:0;">자동 실측 완료 (단위: cm)</h3>
        <div id="resultText"></div>
    </div>

    <div id="maskViews">
        <h4 style="color:#ffdd57; margin:0; margin-bottom: 10px;">🛠️ 파이프라인 디버깅 뷰 (크롭 원본 vs AI 출력)</h4>
        
        <div class="mask-container">
            <div class="mask-wrapper">
                <div class="mask-label">👕 [1-1] 의류 크롭 원본 (AI 입력)</div>
                <div><img id="shirtCropImg"></div>
            </div>
            <div class="mask-wrapper">
                <div class="mask-label">👕 [1-2] 의류 마스크 (AI 출력)</div>
                <div class="checkerboard" style="border-radius: 5px;"><img id="shirtMaskImg"></div>
            </div>
        </div>

        <div class="mask-container">
            <div class="mask-wrapper">
                <div class="mask-label">📄 [2-1] A4 크롭 원본 (AI 입력)</div>
                <div><img id="a4CropImg"></div>
            </div>
            <div class="mask-wrapper">
                <div class="mask-label">📄 [2-2] A4 마스크 (AI 출력)</div>
                <div class="checkerboard" style="border-radius: 5px;"><img id="a4MaskImg"></div>
            </div>
        </div>
    </div>

    <div id="debugPanel">
        <h4>[ 시스템 상태창 ]</h4>
        <div id="debugLog"></div>
    </div>

    <script>
        function calcDist(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
        function distToSegment(p, a, b) {
            let line_len = Math.hypot(b.x - a.x, b.y - a.y);
            if (line_len === 0) return Math.hypot(p.x - a.x, p.y - a.y);
            let u = ((p.x - a.x) * (b.x - a.x) + (p.y - a.y) * (b.y - a.y)) / (line_len * line_len);
            let projX = a.x + u * (b.x - a.x);
            let projY = a.y + u * (b.y - a.y);
            return Math.hypot(p.x - projX, p.y - projY);
        }

        
        function projectPointToLine(p, a, b) {
            let ap = {x: p.x - a.x, y: p.y - a.y};
            let ab = {x: b.x - a.x, y: b.y - a.y};
            let dot_ab = ab.x*ab.x + ab.y*ab.y;
            if (dot_ab === 0) return a;
            let t = (ap.x*ab.x + ap.y*ab.y) / dot_ab;
            t = Math.max(0.0, Math.min(1.0, t));
            return {x: a.x + t*ab.x, y: a.y + t*ab.y};
        }

        function warpPoint(px, py, M_data) {
            let x = M_data[0]*px + M_data[1]*py + M_data[2];
            let y = M_data[3]*px + M_data[4]*py + M_data[5];
            let w = M_data[6]*px + M_data[7]*py + M_data[8];
            return { x: x/w, y: y/w };
        }

        const cameraInput = document.getElementById('cameraInput');
        const interactionCanvas = document.getElementById('interactionCanvas');
        const ctx = interactionCanvas.getContext('2d', { willReadFrequently: true });
        const instruction = document.getElementById('instruction');
        const resetBoxBtn = document.getElementById('resetBoxBtn');
        const startAiBtn = document.getElementById('startAiBtn');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('resultBox');
        const maskViews = document.getElementById('maskViews');
        
        const shirtCropImg = document.getElementById('shirtCropImg');
        const shirtMaskImg = document.getElementById('shirtMaskImg');
        const a4CropImg = document.getElementById('a4CropImg');
        const a4MaskImg = document.getElementById('a4MaskImg');

        let imgObj = null;
        let scaleFactor = 1; 
        // 💡 [버그 수정] 초기 캔버스(원본 이미지) 사이즈를 저장할 변수 추가
        let baseCanvasW = 0, baseCanvasH = 0;
        
        let drawState = 0; 
        let rectShirt = null;
        let rectA4 = null;
        let startX = 0, startY = 0;
        let isDrawing = false;
        let currentRect = {x:0, y:0, w:0, h:0};

        function getPos(e) {
            const rect = interactionCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (interactionCanvas.width / rect.width),
                y: (clientY - rect.top) * (interactionCanvas.height / rect.height)
            };
        }

        function redrawCanvas() {
            if (!imgObj) return;
            ctx.clearRect(0, 0, interactionCanvas.width, interactionCanvas.height);
            ctx.drawImage(imgObj, 0, 0, interactionCanvas.width, interactionCanvas.height);

            const drawRect = (r, color, text) => {
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.strokeRect(r.x, r.y, r.w, r.h);
                ctx.font = "bold 16px sans-serif";
                const textWidth = ctx.measureText(text).width;
                ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                ctx.fillRect(r.x, r.y - 25, textWidth + 10, 25);
                ctx.fillStyle = color;
                ctx.fillText(text, r.x + 5, r.y - 8);
            };

            if (rectShirt) drawRect(rectShirt, "#ff4444", "하의 (Pants)");
            if (rectA4) drawRect(rectA4, "#4CAF50", "A4 용지");
            
            if (isDrawing) {
                let color = drawState === 1 ? "#ff4444" : "#4CAF50";
                ctx.strokeStyle = color;
                ctx.setLineDash([5, 5]);
                ctx.lineWidth = 2;
                ctx.strokeRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
                ctx.setLineDash([]);
            }
        }

        const onDown = (e) => {
            if (drawState !== 1 && drawState !== 2) return;
            e.preventDefault();
            const pos = getPos(e);
            startX = pos.x; startY = pos.y;
            isDrawing = true;
        };

        const onMove = (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPos(e);
            currentRect = { x: Math.min(startX, pos.x), y: Math.min(startY, pos.y), w: Math.abs(pos.x - startX), h: Math.abs(pos.y - startY) };
            redrawCanvas();
        };

        const onUp = (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentRect.w > 30 && currentRect.h > 30) {
                if (drawState === 1) {
                    rectShirt = { ...currentRect };
                    drawState = 2;
                    instruction.innerHTML = "2️⃣ 원본 이미지에서 <span style='color:#4CAF50;'>A4 용지 영역</span>을 드래그하여 박스를 쳐주세요.";
                } else if (drawState === 2) {
                    rectA4 = { ...currentRect };
                    drawState = 3;
                    instruction.innerHTML = "✅ 영역 지정 완료! 하단의 분석 시작 버튼을 눌러주세요.";
                    startAiBtn.style.display = "inline-block";
                }
            }
            redrawCanvas();
        };

        interactionCanvas.addEventListener('mousedown', onDown);
        interactionCanvas.addEventListener('mousemove', onMove);
        interactionCanvas.addEventListener('mouseup', onUp);
        interactionCanvas.addEventListener('touchstart', onDown, {passive: false});
        interactionCanvas.addEventListener('touchmove', onMove, {passive: false});
        interactionCanvas.addEventListener('touchend', onUp);

        // 💡 [버그 수정] 새로 측정 시 캔버스 크기를 무조건 초기 크기(baseCanvas)로 복원합니다.
        resetBoxBtn.addEventListener('click', () => {
            interactionCanvas.width = baseCanvasW;
            interactionCanvas.height = baseCanvasH;
            rectShirt = null; rectA4 = null; currentRect = {x:0, y:0, w:0, h:0};
            drawState = 1;
            instruction.innerHTML = "1️⃣ 원본 이미지에서 <span style='color:#ff4444;'>의류 영역</span>을 드래그하여 박스를 쳐주세요.";
            startAiBtn.style.display = "none";
            resultBox.style.display = "none";
            maskViews.style.display = "none";
            redrawCanvas();
        });

        cameraInput.addEventListener('change', (e) => {
            if (!isCvReady || !isAiReady) return;
            if (e.target.files && e.target.files[0]) {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    imgObj = new Image();
                    imgObj.onload = function() {
                        const MAX_WIDTH = 800;
                        let w = imgObj.width, h = imgObj.height;
                        if (w > MAX_WIDTH) { scaleFactor = MAX_WIDTH / w; h = Math.round(h * scaleFactor); w = MAX_WIDTH; } 
                        else { scaleFactor = 1; }
                        
                        // 💡 [버그 수정] 이미지 최초 로드 시의 원본 캔버스 크기 저장
                        baseCanvasW = w;
                        baseCanvasH = h;
                        
                        interactionCanvas.width = w; interactionCanvas.height = h;
                        interactionCanvas.style.display = "block";
                        instruction.style.display = "inline-block";
                        resetBoxBtn.style.display = "inline-block";
                        document.getElementById('captureBtn').style.display = "none";
                        rectShirt = null; rectA4 = null; drawState = 1;
                        instruction.innerHTML = "1️⃣ 원본 이미지에서 <span style='color:#ff4444;'>의류 영역</span>을 드래그하여 박스를 쳐주세요.";
                        startAiBtn.style.display = "none";
                        resultBox.style.display = "none";
                        maskViews.style.display = "none";
                        redrawCanvas();
                    }
                    imgObj.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        function cropCanvasToBlob(rect) {
            const temp = document.createElement('canvas');
            temp.width = rect.w; temp.height = rect.h;
            const sx = rect.x / scaleFactor, sy = rect.y / scaleFactor, sw = rect.w / scaleFactor, sh = rect.h / scaleFactor;
            temp.getContext('2d').drawImage(imgObj, sx, sy, sw, sh, 0, 0, rect.w, rect.h);
            return new Promise(res => temp.toBlob(res, 'image/jpeg'));
        }

        startAiBtn.addEventListener('click', async () => {
            instruction.style.display = "none";
            resetBoxBtn.style.display = "none";
            startAiBtn.style.display = "none";
            loader.style.display = "block";
            
            const tempShirt = rectShirt, tempA4 = rectA4;
            rectShirt = null; rectA4 = null; isDrawing = false;
            redrawCanvas();

            let originalSrc = cv.imread('interactionCanvas');
            let src = originalSrc.clone();
            rectShirt = tempShirt; rectA4 = tempA4;

            try {
                logMsg("🤖 영역 1: 의류 영역 독립 분석 중...");
                let blobShirt = await cropCanvasToBlob(rectShirt);
                shirtCropImg.src = URL.createObjectURL(blobShirt); 
                let maskBlobShirt = await window.removeBg(blobShirt);
                let imgShirt = new Image();
                await new Promise(r => { imgShirt.onload = r; imgShirt.src = URL.createObjectURL(maskBlobShirt); });

                logMsg("🤖 영역 2: A4 영역 독립 분석 중...");
                let blobA4 = await cropCanvasToBlob(rectA4);
                a4CropImg.src = URL.createObjectURL(blobA4);
                let maskBlobA4 = await window.removeBg(blobA4);
                let imgA4 = new Image();
                await new Promise(r => { imgA4.onload = r; imgA4.src = URL.createObjectURL(maskBlobA4); });

                shirtMaskImg.src = imgShirt.src;
                a4MaskImg.src = imgA4.src;
                maskViews.style.display = "block";

                // ==========================================
                // 📄 1. A4 용지 분석
                // ==========================================
                let tempA4Canvas = document.createElement('canvas');
                tempA4Canvas.width = rectA4.w; tempA4Canvas.height = rectA4.h;
                tempA4Canvas.getContext('2d').drawImage(imgA4, 0, 0);
                
                let a4Mat = cv.imread(tempA4Canvas);
                let rgbaPlanesA4 = new cv.MatVector();
                cv.split(a4Mat, rgbaPlanesA4);
                let a4Alpha = rgbaPlanesA4.get(3); 
                cv.threshold(a4Alpha, a4Alpha, 10, 255, cv.THRESH_BINARY);
                
                let contoursA4 = new cv.MatVector(), hierarchyA4 = new cv.Mat();
                cv.findContours(a4Alpha, contoursA4, hierarchyA4, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
                if (contoursA4.size() === 0) throw new Error("A4_NOT_FOUND");

                let maxArea = 0; let largestContourIndex = 0;
                for (let i = 0; i < contoursA4.size(); i++) {
                    let area = cv.contourArea(contoursA4.get(i));
                    if (area > maxArea) { maxArea = area; largestContourIndex = i; }
                }
                if (maxArea < 1000) throw new Error("A4_TOO_SMALL");

                let cntA4 = contoursA4.get(largestContourIndex);
                let peri = cv.arcLength(cntA4, true);
                let approx = new cv.Mat();
                cv.approxPolyDP(cntA4, approx, 0.04 * peri, true); 
                if (approx.rows !== 4) throw new Error("A4_NOT_QUAD");

                let pts = [];
                for (let j = 0; j < 4; j++) { pts.push({x: approx.data32S[j*2] + rectA4.x, y: approx.data32S[j*2+1] + rectA4.y}); }

                let sum = pts.map(p => p.x + p.y), diff = pts.map(p => p.x - p.y);
                let tl = pts[sum.indexOf(Math.min(...sum))], br = pts[sum.indexOf(Math.max(...sum))];
                let tr = pts[diff.indexOf(Math.max(...diff))], bl = pts[diff.indexOf(Math.min(...diff))];

                let wTop = Math.hypot(tl.x - tr.x, tl.y - tr.y), wBot = Math.hypot(bl.x - br.x, bl.y - br.y);
                let hLef = Math.hypot(tl.x - bl.x, tl.y - bl.y), hRig = Math.hypot(tr.x - br.x, tr.y - br.y);
                let dstW = Math.max(wTop, wBot); 
                let dstH = dstW * (29.7 / 21.0); 

                let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tl.x + dstW, tl.y, tl.x + dstW, tl.y + dstH, tl.x, tl.y + dstH]);
                let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);

                let M = cv.getPerspectiveTransform(srcTri, dstTri);

                logMsg("📏 원본 잘림 방지를 위한 캔버스 확장 매트릭스 계산 중...");
                let M_data = M.data64F;
                
                let corners = [ warpPoint(0, 0, M_data), warpPoint(src.cols, 0, M_data), warpPoint(src.cols, src.rows, M_data), warpPoint(0, src.rows, M_data) ];
                let minX = Math.min(...corners.map(p => p.x)), minY = Math.min(...corners.map(p => p.y));
                let maxX = Math.max(...corners.map(p => p.x)), maxY = Math.max(...corners.map(p => p.y));

                let dx = -Math.min(0, Math.round(minX)), dy = -Math.min(0, Math.round(minY));
                let newWidth = Math.round(maxX + dx), newHeight = Math.round(maxY + dy);

                const MAX_CANVAS_SIZE = 4000;
                if (newWidth > MAX_CANVAS_SIZE || newHeight > MAX_CANVAS_SIZE) { throw new Error("WARP_TOO_LARGE"); }

                let T = cv.matFromArray(3, 3, cv.CV_64F, [1, 0, dx, 0, 1, dy, 0, 0, 1]);
                let M_new = new cv.Mat();
                cv.gemm(T, M, 1, new cv.Mat(), 0, M_new);

                let warpedSrc = new cv.Mat();
                cv.warpPerspective(src, warpedSrc, M_new, new cv.Size(newWidth, newHeight));
                src.delete(); src = warpedSrc;

                interactionCanvas.width = newWidth; interactionCanvas.height = newHeight;

                let ppcm_w = dstW / 21.0, ppcm_h = dstH / 29.7;
                let ppcm = (ppcm_w + ppcm_h) / 2.0;

                let cCyan = new cv.Scalar(0, 255, 255, 255);
                cv.rectangle(src, new cv.Point(tl.x + dx, tl.y + dy), new cv.Point(tl.x + dstW + dx, tl.y + dstH + dy), cCyan, 2);
                let dotColorA4 = new cv.Scalar(255, 0, 255, 255);
                let a4Corners = [ {x:tl.x+dx, y:tl.y+dy}, {x:tl.x+dstW+dx, y:tl.y+dy}, {x:tl.x+dstW+dx, y:tl.y+dstH+dy}, {x:tl.x+dx, y:tl.y+dstH+dy} ];
                for(let pt of a4Corners) { cv.circle(src, new cv.Point(pt.x, pt.y), 6, dotColorA4, -1); }
                cv.putText(src, "A4 Paper (Reference)", new cv.Point(tl.x + dx, tl.y + dy - 10), cv.FONT_HERSHEY_SIMPLEX, 0.6, cCyan, 2);

                
                // ==========================================
                // 👖 2. 의류 마스크 병합 (하의용)
                // ==========================================
                logMsg("👖 바지(하의) 형태학 기반 윤곽선 분석 시작...");
                let fullShirtMask = cv.Mat.zeros(originalSrc.rows, originalSrc.cols, cv.CV_8UC1);
                let tempShirtCanvas = document.createElement('canvas');
                tempShirtCanvas.width = rectShirt.w; tempShirtCanvas.height = rectShirt.h;
                tempShirtCanvas.getContext('2d').drawImage(imgShirt, 0, 0);
                
                let shirtMat = cv.imread(tempShirtCanvas);
                let rgbaPlanesShirt = new cv.MatVector();
                cv.split(shirtMat, rgbaPlanesShirt);
                let shirtAlpha = rgbaPlanesShirt.get(3); 
                cv.threshold(shirtAlpha, shirtAlpha, 10, 255, cv.THRESH_BINARY);

                let rx = Math.max(0, rectShirt.x);
                let ry = Math.max(0, rectShirt.y);
                let rw = Math.min(originalSrc.cols - rx, rectShirt.w);
                let rh = Math.min(originalSrc.rows - ry, rectShirt.h);
                let roi = fullShirtMask.roi(new cv.Rect(rx, ry, rw, rh));
                shirtAlpha.copyTo(roi);

                logMsg("👖 텐서 기하학 왜곡 보정 적용 중...");
                let warpedShirtMask = new cv.Mat();
                cv.warpPerspective(fullShirtMask, warpedShirtMask, M_new, new cv.Size(newWidth, newHeight), cv.INTER_NEAREST);
                cv.threshold(warpedShirtMask, warpedShirtMask, 127, 255, cv.THRESH_BINARY);

                let contoursShirt = new cv.MatVector(), hierarchyShirt = new cv.Mat();
                cv.findContours(warpedShirtMask, contoursShirt, hierarchyShirt, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

                if (contoursShirt.size() === 0) throw new Error("SHIRT_NOT_FOUND");

                let maxAreaS = 0; let sIdx = 0;
                for (let i = 0; i < contoursShirt.size(); i++) {
                    let a = cv.contourArea(contoursShirt.get(i));
                    if(a > maxAreaS) { maxAreaS = a; sIdx = i; }
                }

                let tshirt_cnt = contoursShirt.get(sIdx).clone();
                let rect = cv.boundingRect(tshirt_cnt);
                let mid_x = rect.x + rect.width / 2;

                logMsg("👖 바지 주요 특징점(사타구니, 허리, 밑단) 추출 중...");
                
                // 1. 사타구니 (볼록 결함 유지)
                let hullIndices = new cv.Mat(), defects = new cv.Mat();
                cv.convexHull(tshirt_cnt, hullIndices, false, false);
                cv.convexityDefects(tshirt_cnt, hullIndices, defects);

                let crotch_pt = null;
                let max_depth = 0;

                for (let i = 0; i < defects.rows; ++i) {
                    let farthestIdx = defects.data32S[i * 4 + 2];
                    let depth = defects.data32S[i * 4 + 3] / 256.0;
                    let fx = tshirt_cnt.data32S[farthestIdx * 2], fy = tshirt_cnt.data32S[farthestIdx * 2 + 1];

                    if (depth > 10.0 && fy > rect.y + rect.height * 0.2 && fy < rect.y + rect.height * 0.8) {
                        if (fx > rect.x + rect.width * 0.3 && fx < rect.x + rect.width * 0.7) {
                            if (depth > max_depth) {
                                max_depth = depth;
                                crotch_pt = {x: fx, y: fy};
                            }
                        }
                    }
                }
                if (!crotch_pt) { crotch_pt = {x: mid_x, y: rect.y + rect.height * 0.4}; }

                // 변수명 중복 에러 해결 (pts -> pants_pts)
                let pants_pts = [];
                for (let i = 0; i < tshirt_cnt.rows; i++) {
                    pants_pts.push({x: tshirt_cnt.data32S[i*2], y: tshirt_cnt.data32S[i*2+1]});
                }

                // 2. 허리 양끝점 (Waist L/R)
                let upper_pts = pants_pts.filter(p => p.y < rect.y + rect.height * 0.3);
                if (upper_pts.length === 0) upper_pts = pants_pts;

                // 최상단 좌/우측 꼭짓점 찾기
                let waist_l = upper_pts.reduce((min, p) => (p.x + p.y < min.x + min.y ? p : min), upper_pts[0]);
                let waist_r = upper_pts.reduce((max, p) => (p.x - p.y > max.x - max.y ? p : max), upper_pts[0]);

                // 3. 밑단 (Hem) - 왼쪽 다리(Left Leg) 기준 수학적 모서리 스냅
                let left_leg_pts = pants_pts.filter(p => p.x < crotch_pt.x && p.y > crotch_pt.y);
                if (left_leg_pts.length === 0) left_leg_pts = pants_pts;
                
                // y-x 가 가장 크면 왼쪽 아래, y+x 가 가장 크면 오른쪽 아래
                let hem_l_left = left_leg_pts.reduce((max, p) => (p.y - p.x > max.y - max.x ? p : max), left_leg_pts[0]);
                let hem_l_right = left_leg_pts.reduce((max, p) => (p.y + p.x > max.y + max.x ? p : max), left_leg_pts[0]);

                // 4. 허벅지 (Thigh) - 사타구니에서 수직 투영 후 '실제 실루엣'에 스냅 (준섭님 피드백 완벽 반영)
                let proj_thigh = projectPointToLine(crotch_pt, waist_l, hem_l_left); // 가상의 수직점
                let left_outline = pants_pts.filter(p => p.x < crotch_pt.x); // 바지 왼쪽 테두리 점들만 모음
                
                // 가상의 수직점에서 가장 가까운 '진짜 바지 테두리 픽셀'을 찾아 자석처럼 붙임
                let thigh_l_left = left_outline.reduce((closest, p) => 
                    calcDist(p, proj_thigh) < calcDist(closest, proj_thigh) ? p : closest, left_outline[0]
                );
                let thigh_l_right = crotch_pt;

                // 5. 허리 실루엣(곡선) 경로 추출
                let idx_wl = -1, idx_wr = -1;
                for (let i = 0; i < tshirt_cnt.rows; i++) {
                    if (tshirt_cnt.data32S[i*2] === waist_l.x && tshirt_cnt.data32S[i*2+1] === waist_l.y) idx_wl = i;
                    if (tshirt_cnt.data32S[i*2] === waist_r.x && tshirt_cnt.data32S[i*2+1] === waist_r.y) idx_wr = i;
                }

                let path1 = [], path2 = [];
                let n = tshirt_cnt.rows;
                let curr = idx_wl;
                while(curr !== idx_wr) { path1.push({x: tshirt_cnt.data32S[curr*2], y: tshirt_cnt.data32S[curr*2+1]}); curr = (curr + 1) % n; }
                path1.push(waist_r);

                curr = idx_wl;
                while(curr !== idx_wr) { path2.push({x: tshirt_cnt.data32S[curr*2], y: tshirt_cnt.data32S[curr*2+1]}); curr = (curr - 1 + n) % n; }
                path2.push(waist_r);

                let avgY1 = path1.reduce((s, p) => s + p.y, 0) / path1.length;
                let avgY2 = path2.reduce((s, p) => s + p.y, 0) / path2.length;
                let top_waist_path = avgY1 < avgY2 ? path1 : path2;

                // 허리 곡선 길이 계산 및 각 픽셀까지의 누적 거리 저장
                let waist_curve_len = 0;
                let cumulative_distances = [0]; 
                for(let i = 0; i < top_waist_path.length - 1; i++) {
                    let d = calcDist(top_waist_path[i], top_waist_path[i+1]);
                    waist_curve_len += d;
                    cumulative_distances.push(waist_curve_len);
                }
                
                // 💡 곡선의 길이를 쫙 폈을 때 정확히 50%가 되는 정중앙 픽셀 찾기
                let half_len = waist_curve_len / 2;
                let waist_center_top = top_waist_path[0];
                for(let i = 0; i < cumulative_distances.length; i++) {
                    if(cumulative_distances[i] >= half_len) {
                        waist_center_top = top_waist_path[i];
                        break;
                    }
                }

                // 6. 최종 치수 계산 (준섭님 공식 적용)
                // 총장: 왼쪽 허리끝 ~ 왼쪽 밑단끝 
                let length_cm = calcDist(waist_l, hem_l_left) / ppcm;
                let waist_cm = waist_curve_len / ppcm;
                let rise_cm = calcDist(waist_center_top, crotch_pt) / ppcm;
                let hem_cm = calcDist(hem_l_left, hem_l_right) / ppcm;
                let thigh_cm = calcDist(thigh_l_left, thigh_l_right) / ppcm;

                logMsg("👖 시각화 이미지 생성 중...");
                let cWhite = new cv.Scalar(255, 255, 255, 255);
                let cMagenta = new cv.Scalar(255, 0, 255, 255); 
                let cBlue = new cv.Scalar(255, 100, 100, 255);
                let cGreen = new cv.Scalar(100, 255, 100, 255);
                let cRed = new cv.Scalar(100, 100, 255, 255);
                let cYellow = new cv.Scalar(255, 255, 100, 255);
                let cGray = new cv.Scalar(200, 200, 200, 255);

                let ptsToDraw = new cv.MatVector(); ptsToDraw.push_back(tshirt_cnt);
                cv.drawContours(src, ptsToDraw, 0, cWhite, 2);
                ptsToDraw.delete();

                // 사타구니 볼록 결함 시각화 유지
                for (let i = 0; i < defects.rows; ++i) {
                    let farthestIdx = defects.data32S[i * 4 + 2];
                    let depth = defects.data32S[i * 4 + 3] / 256.0;
                    if (depth > 10.0) {
                        let fx = tshirt_cnt.data32S[farthestIdx * 2], fy = tshirt_cnt.data32S[farthestIdx * 2 + 1];
                        cv.circle(src, new cv.Point(fx, fy), 4, cMagenta, -1);
                    }
                }

                // 📌 선 그리기
                // 1) 허리 단면 (실루엣 곡선을 따라 파란색 선 그리기)
                for (let i = 0; i < top_waist_path.length - 1; i++) {
                    cv.line(src, new cv.Point(top_waist_path[i].x, top_waist_path[i].y), new cv.Point(top_waist_path[i+1].x, top_waist_path[i+1].y), cBlue, 3);
                }
                
                // 2) 나머지 직선들
                cv.line(src, new cv.Point(waist_center_top.x, waist_center_top.y), new cv.Point(crotch_pt.x, crotch_pt.y), cGreen, 3); // 밑위
                cv.line(src, new cv.Point(hem_l_left.x, hem_l_left.y), new cv.Point(hem_l_right.x, hem_l_right.y), cRed, 3); // 밑단
                cv.line(src, new cv.Point(thigh_l_left.x, thigh_l_left.y), new cv.Point(thigh_l_right.x, thigh_l_right.y), cYellow, 3); // 허벅지
                cv.line(src, new cv.Point(waist_l.x, waist_l.y), new cv.Point(hem_l_left.x, hem_l_left.y), cGray, 3); // 총장 (제일 왼쪽 선)

                // 📌 주요 점 찍기
                let dotColor = new cv.Scalar(0, 165, 255, 255);
                let keyPoints = [waist_l, waist_r, waist_center_top, crotch_pt, hem_l_left, hem_l_right, thigh_l_left, thigh_l_right];
                for(let pt of keyPoints) { cv.circle(src, new cv.Point(pt.x, pt.y), 7, dotColor, -1); }

                // 📌 텍스트 라벨 달기
                cv.putText(src, `Waist ${waist_cm.toFixed(1)}cm`, new cv.Point(waist_center_top.x - 50, waist_center_top.y - 20), cv.FONT_HERSHEY_SIMPLEX, 0.7, cBlue, 2);
                cv.putText(src, `Rise ${rise_cm.toFixed(1)}cm`, new cv.Point(waist_center_top.x + 10, (waist_center_top.y + crotch_pt.y) / 2), cv.FONT_HERSHEY_SIMPLEX, 0.7, cGreen, 2);
                cv.putText(src, `Hem ${hem_cm.toFixed(1)}cm`, new cv.Point((hem_l_left.x + hem_l_right.x) / 2, hem_l_left.y - 20), cv.FONT_HERSHEY_SIMPLEX, 0.7, cRed, 2);
                cv.putText(src, `Thigh ${thigh_cm.toFixed(1)}cm`, new cv.Point((thigh_l_left.x + thigh_l_right.x) / 2, thigh_l_left.y - 20), cv.FONT_HERSHEY_SIMPLEX, 0.7, cYellow, 2);
                cv.putText(src, `Length ${length_cm.toFixed(1)}cm`, new cv.Point(waist_l.x + 10, (waist_l.y + hem_l_left.y) / 2), cv.FONT_HERSHEY_SIMPLEX, 0.7, cGray, 2);

                document.getElementById('resultText').innerHTML = `
                    <div class="result-item"><span><span style="color:blue;font-weight:bold;">ㅡ</span> 허리 단면 (실루엣 기준)</span> <strong>${waist_cm.toFixed(1)} cm</strong></div>
                    <div class="result-item"><span><span style="color:green;font-weight:bold;">|</span> 밑위</span> <strong>${rise_cm.toFixed(1)} cm</strong></div>
                    <div class="result-item"><span><span style="color:yellow;font-weight:bold;">ㅡ</span> 허벅지 단면</span> <strong>${thigh_cm.toFixed(1)} cm</strong></div>
                    <div class="result-item"><span><span style="color:red;font-weight:bold;">ㅡ</span> 밑단 단면</span> <strong>${hem_cm.toFixed(1)} cm</strong></div>
                    <div class="result-item"><span><span style="color:gray;font-weight:bold;">/</span> 총장</span> <strong>${length_cm.toFixed(1)} cm</strong></div>
                    
                    <div style="font-size:13px; color:#ffdd57; text-align:center; padding-top:15px; line-height:1.5;">
                        ✨ <b>하의 기하학 정밀 측정 성공!</b> ✨
                    </div>
                `;

                cv.imshow('interactionCanvas', src);

                loader.style.display = "none";
                resultBox.style.display = "block";
                instruction.style.display = "inline-block";
                instruction.innerText = "🎉 측정이 완료되었습니다!";
                resetBoxBtn.style.display = "inline-block";
                resetBoxBtn.innerText = "새로 측정하기";

                originalSrc.delete(); src.delete(); a4Mat.delete(); a4Alpha.delete(); rgbaPlanesA4.delete();
                contoursA4.delete(); hierarchyA4.delete(); approx.delete();
                dstTri.delete(); srcTri.delete(); M.delete(); shirtMat.delete(); shirtAlpha.delete(); rgbaPlanesShirt.delete();
                fullShirtMask.delete(); warpedShirtMask.delete(); contoursShirt.delete(); hierarchyShirt.delete();
                
                tshirt_cnt.delete(); hullIndices.delete(); defects.delete();
                T.delete(); M_new.delete();

            } catch (err) {
                console.error(err);
                loader.style.display = "none";
                
                let errorMsg = "알 수 없는 오류가 발생했습니다.";
                if (err.message === "A4_NOT_FOUND" || err.message === "A4_TOO_SMALL") errorMsg = "A4 용지를 찾을 수 없거나 지정한 영역이 너무 작습니다.";
                if (err.message === "A4_NOT_QUAD") errorMsg = "A4 용지의 4개 꼭짓점을 찾을 수 없습니다. (모서리가 가려졌는지 확인하세요)";
                if (err.message === "SHIRT_NOT_FOUND") errorMsg = "의류 실루엣을 찾을 수 없습니다.";
                if (err.message === "WARP_TOO_LARGE") errorMsg = "A4 용지의 형태가 심하게 왜곡 인식되었습니다. 상자를 A4 용지에만 딱 맞게 다시 그려주세요.";

                alert(`🚨 누끼 추출 및 치수 분석 실패!\n\n원인: ${errorMsg}\n\n[엔진 상세 에러]: ${err.message || err}\n\n박스 영역을 다시 지정하거나 사진을 다시 촬영해주세요.`);                
                instruction.style.display = "inline-block";
                resetBoxBtn.style.display = "inline-block";
                redrawCanvas();
            }
        });
    </script>
</body>
</html>
